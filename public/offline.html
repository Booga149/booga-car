<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e11d48">
  <title>Booga Car — غير متصل</title>
  <link rel="icon" href="/favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white; padding: 2rem;
    }
    .container {
      text-align: center; max-width: 400px;
    }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 2rem;
      background: rgba(225,29,72,0.15); border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(225,29,72,0.3);
    }
    .icon svg { width: 40px; height: 40px; color: #e11d48; }
    h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 0.8rem; }
    p { color: rgba(255,255,255,0.6); font-size: 1rem; line-height: 1.6; margin-bottom: 2rem; }
    .retry-btn {
      padding: 1rem 2.5rem; background: #e11d48; color: white;
      border: none; border-radius: 14px; font-weight: 800;
      font-size: 1.1rem; cursor: pointer;
      box-shadow: 0 8px 25px rgba(225,29,72,0.3);
      transition: all 0.3s;
    }
    .retry-btn:active { transform: scale(0.95); }
    .logo { font-size: 1.2rem; font-weight: 900; color: rgba(255,255,255,0.3); margin-top: 3rem; letter-spacing: -0.5px; }
    .logo span { color: #e11d48; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 5.636a9 9 0 000 12.728M12 12v.01"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.464 8.464a5 5 0 010 7.072M15.536 8.464a5 5 0 000 7.072"/>
      </svg>
    </div>
    <h1>غير متصل بالإنترنت</h1>
    <p>يبدو أنك غير متصل بالإنترنت حالياً. تأكد من اتصالك وحاول مرة أخرى.</p>
    <button class="retry-btn" onclick="window.location.reload()">إعادة المحاولة</button>
    <div class="logo">BOOGA <span>CAR</span></div>
  </div>
</body>
</html>
